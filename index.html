<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Quote Generator</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f4f4; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0;">
    <h1 style="color: #333;">Dynamic Quote Generator</h1>
    <div id="quoteDisplay" style="margin: 20px; padding: 20px; border: 2px solid #333; border-radius: 10px; background-color: #fff; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2); width: 80%; max-width: 600px; text-align: center;">"Click the button to see a quote!"</div>
    <button id="newQuote" style="padding: 10px 20px; margin: 10px; border: none; border-radius: 5px; background-color: #007BFF; color: white; cursor: pointer; font-size: 16px;">Show New Quote</button>
    <div>
        <input id="newQuoteText" type="text" placeholder="Enter a new quote" style="padding: 10px; margin: 10px; border: 1px solid #ccc; border-radius: 5px; width: calc(50% - 22px);" />
        <input id="newQuoteCategory" type="text" placeholder="Enter quote category" style="padding: 10px; margin: 10px; border: 1px solid #ccc; border-radius: 5px; width: calc(50% - 22px);" />
        <button onclick="addQuote()" style="padding: 10px 20px; margin: 10px; border: none; border-radius: 5px; background-color: #007BFF; color: white; cursor: pointer; font-size: 16px;">Add Quote</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
